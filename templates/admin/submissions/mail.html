{% extends "admin/base.html" %}
{% block title %}Wyslij mail{% endblock %}
{% block content %}
<div class="admin-page-title">
    <div>
        <p class="admin-eyebrow">{{ form.name }} / {{ submission.submission_id }}</p>
        <h1>Wyslij mail</h1>
    </div>
    <a class="admin-button-secondary" href="{{ url_for('admin.submission_detail', form_id=form.id, submission_pk=submission.id) }}">Powrot</a>
</div>
<form method="post" class="admin-card admin-form">
    <input type="hidden" name="csrf_token" value="{{ admin_csrf_token() }}">
    <div class="admin-form-grid">
        <label><span>Adresat</span><input name="to_email" value="{{ submission.email }}" required></label>
        <label>
            <span>Szablon</span>
            <select name="template_id">
                {% if templates %}
                    {% for template in templates %}
                        <option value="{{ template.id }}" {% if loop.first %}selected{% endif %}>{{ template.name }}</option>
                    {% endfor %}
                {% else %}
                    <option value="">Mail systemowy</option>
                {% endif %}
            </select>
        </label>
        <label class="admin-form-wide"><span>Temat</span><input name="subject" value=""></label>
        <label class="admin-form-wide"><span>Tresc HTML</span><textarea name="html_body" rows="12"></textarea></label>
        <label class="admin-form-wide"><span>Tresc TXT</span><textarea name="text_body" rows="6"></textarea></label>
        <label>
            <span>Stopka</span>
            <select name="footer_id">
                <option value="">Bez stopki</option>
                {% for footer in footers %}
                    <option value="{{ footer.id }}" {% if footer.is_default %}selected{% endif %}>{{ footer.name }}</option>
                {% endfor %}
            </select>
        </label>
    </div>
    <div class="admin-form-actions">
        <a class="admin-button-secondary" href="{{ url_for('admin.submission_detail', form_id=form.id, submission_pk=submission.id) }}">Anuluj</a>
        <button class="admin-button" type="submit">Wyslij</button>
    </div>
</form>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const templates = {{ template_payload|tojson }};
    const byId = new Map(templates.map(item => [String(item.id), item]));
    const select = document.querySelector('select[name="template_id"]');
    const subject = document.querySelector('input[name="subject"]');
    const htmlBody = document.querySelector('textarea[name="html_body"]');
    const textBody = document.querySelector('textarea[name="text_body"]');

    function fillFromTemplate() {
        const template = byId.get(String(select.value));
        if (!template) return;
        subject.value = template.subject || "";
        htmlBody.value = template.html_body || "";
        textBody.value = template.text_body || "";
    }

    if (select && templates.length) {
        fillFromTemplate();
        select.addEventListener("change", fillFromTemplate);
    }
});
</script>
{% endblock %}
