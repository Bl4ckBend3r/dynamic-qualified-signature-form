{% extends "admin/base.html" %}
{% block title %}Edycja formularza{% endblock %}
{% block content %}
<div class="admin-page-title">
    <div>
        <p class="admin-eyebrow">Ustawienia formularza</p>
        <h1>{{ form.name }}</h1>
    </div>
    <div class="admin-actions">
        <a class="admin-button-secondary" href="{{ url_for('admin.form_fields', form_id=form.id) }}">Pola</a>
        <a class="admin-button-secondary" href="{{ url_for('admin.forms_list') }}">Powrot</a>
    </div>
</div>
<form method="post" class="admin-card admin-form">
    <input type="hidden" name="csrf_token" value="{{ admin_csrf_token() }}">
    <div class="admin-form-grid">
        <label><span>Nazwa</span><input name="name" value="{{ form.name }}" required></label>
        <label><span>Slug</span><input name="slug" value="{{ form.slug }}" required></label>
        <label><span>Tytul</span><input name="title" value="{{ form.title }}"></label>
        <label><span>Kolejnosc sortowania</span><input type="number" name="sort_order" value="{{ form.sort_order }}"></label>
        <label class="admin-form-wide"><span>Opis</span><textarea name="description">{{ form.description }}</textarea></label>
        <label><span>Etykieta</span><input name="label_text" value="{{ form.label_text }}" placeholder="PROJEKT 6.08"></label>
        <label><span>Wariant etykiety</span><input name="label_variant" value="{{ form.label_variant }}"></label>
        <label><span>Kolor tekstu etykiety</span><input name="label_color" value="{{ form.label_color }}"></label>
        <label><span>Tlo etykiety</span><input name="label_background" value="{{ form.label_background }}"></label>
        <label>
            <span>Logo</span>
            <select name="logo_id">
                <option value="">Bez logo</option>
                {% for logo in logos %}
                    <option value="{{ logo.id }}" {% if form.logo_id == logo.id %}selected{% endif %}>{{ logo.name }}{% if not logo.active %} (nieaktywne){% endif %}</option>
                {% endfor %}
            </select>
        </label>
        <label class="admin-check"><input type="checkbox" name="is_active" {% if form.is_active %}checked{% endif %}><span>Aktywny</span></label>
        <label class="admin-check"><input type="checkbox" name="is_public" {% if form.is_public %}checked{% endif %}><span>Widoczny publicznie</span></label>
    </div>
    {% if g.admin_user.role == "super_admin" %}
        <div class="admin-section">
            <h2>Uprawnienia</h2>
            <div class="admin-check-grid">
                {% for user in users %}
                    <label class="admin-check"><input type="checkbox" name="user_ids" value="{{ user.id }}" {% if user.id in assigned_user_ids %}checked{% endif %}><span>{{ user.email }} ({{ user.role }})</span></label>
                {% endfor %}
            </div>
        </div>
    {% endif %}
    <div class="admin-form-actions">
        <a class="admin-button-secondary" href="{{ url_for('admin.forms_list') }}">Anuluj</a>
        <button class="admin-button" type="submit">Zapisz</button>
    </div>
</form>
{% endblock %}
