{% extends "admin/base.html" %}
{% block title %}Uzytkownik{% endblock %}
{% block content %}
<div class="admin-page-title">
    <div>
        <p class="admin-eyebrow">Uzytkownicy</p>
        <h1>{{ "Nowy uzytkownik" if not user.id else user.email }}</h1>
    </div>
    <a class="admin-button-secondary" href="{{ url_for('admin.users_list') }}">Powrot</a>
</div>
<form method="post" class="admin-card admin-form">
    <input type="hidden" name="csrf_token" value="{{ admin_csrf_token() }}">
    <div class="admin-form-grid">
        <label><span>E-mail</span><input type="email" name="email" value="{{ user.email }}" required></label>
        <label><span>Haslo {% if user.id %}(wypelnij tylko przy zmianie){% endif %}</span><input type="password" name="password"></label>
        <label><span>Rola</span><select name="role">{% for role in roles %}<option value="{{ role }}" {% if user.role == role %}selected{% endif %}>{{ role }}</option>{% endfor %}</select></label>
        <label class="admin-check"><input type="checkbox" name="is_active" {% if user.is_active or not user.id %}checked{% endif %}><span>Aktywny</span></label>
        <label class="admin-check"><input type="checkbox" name="is_blocked" {% if user.is_blocked %}checked{% endif %}><span>Zablokowany</span></label>
    </div>
    <div class="admin-section">
        <h2>Dostep do formularzy</h2>
        <div class="admin-check-grid">
            {% for form in forms %}
                <label class="admin-check"><input type="checkbox" name="form_ids" value="{{ form.id }}" {% if form.id in assigned_form_ids %}checked{% endif %}><span>{{ form.name }}</span></label>
            {% else %}
                <p>Brak formularzy do przypisania.</p>
            {% endfor %}
        </div>
    </div>
    <div class="admin-form-actions">
        <button class="admin-button" type="submit">Zapisz</button>
    </div>
</form>
{% endblock %}
