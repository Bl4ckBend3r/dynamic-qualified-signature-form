services:
  app:
    build: .
    container_name: formularze-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - formularze_tmp:/tmp/formularze

  postgres:
    image: postgres:16-alpine
    container_name: formularze-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-formularze}
      POSTGRES_USER: ${POSTGRES_USER:-formularze}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-formularze} -d $${POSTGRES_DB:-formularze}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  formularze_tmp:
