<header class="site-header">
    <div class="container site-header__inner">
        <a href="{{ url_for('public_forms.index') }}" class="site-brand" aria-label="Strona główna">
            <img
                src="{{ url_for('static', filename='images/logo.png') }}"
                alt="Logo Województwa Lubuskiego"
                class="site-brand__logo"
            >
            <div class="site-brand__text">
                <span class="site-title">{{ app_name }}</span>
                <span class="site-subtitle">Platforma składania formularzy online</span>
            </div>
        </a>

        <nav class="site-nav" aria-label="Nawigacja główna">
    <a
        href="{{ url_for('public_forms.index') }}"
        class="{% if request.endpoint == 'public_forms.index' %}is-active{% endif %}"
    >
        Strona główna
    </a>

    <a
        href="{{ url_for('documents.documents_to_sign') }}"
        class="{% if request.endpoint == 'documents.documents_to_sign' %}is-active{% endif %}"
    >
        Do Podpisania
    </a>

    <a
        href="#"
        class="{% if request.endpoint == 'contact' %}is-active{% endif %}"
    >
        Kontakt
    </a>
</nav>
    </div>
</header>
