{% extends "admin/base.html" %}
{% block title %}Zmiana hasla{% endblock %}
{% block content %}
<div class="admin-page-title">
    <div>
        <p class="admin-eyebrow">Uzytkownicy</p>
        <h1>Zmien haslo</h1>
    </div>
    <a class="admin-button-secondary" href="{{ url_for('admin.users_list') }}">Powrot</a>
</div>
<form method="post" class="admin-card admin-form">
    <input type="hidden" name="csrf_token" value="{{ admin_csrf_token() }}">
    <div class="admin-form-grid">
        <label><span>Uzytkownik</span><input value="{{ user.email }}" readonly></label>
        <label><span>Nowe haslo</span><input type="password" name="password" required></label>
        <label><span>Powtorz nowe haslo</span><input type="password" name="password_confirm" required></label>
    </div>
    <div class="admin-form-actions">
        <a class="admin-button-secondary" href="{{ url_for('admin.users_list') }}">Anuluj</a>
        <button class="admin-button" type="submit">Zmien haslo</button>
    </div>
</form>
{% endblock %}
